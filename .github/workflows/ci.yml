name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.88.0
          targets: wasm32-unknown-unknown
          components: clippy,rustfmt

      - uses: Swatinem/rust-cache@v2

      - name: Use pinned npm
        run: npm install -g npm@11.12.1

      - name: Install wasm-pack
        run: cargo install wasm-pack --version 0.13.1 --locked

      - name: Install dependencies
        run: npm ci

      - name: JavaScript tests
        run: npm test

      - name: TypeScript
        run: npm run typecheck

      - name: Dependency audit
        run: npm audit

      - name: Rust format
        run: cargo fmt --check

      - name: Rust check
        run: cargo check --workspace

      - name: Rust check wasm
        run: cargo check --workspace --target wasm32-unknown-unknown

      - name: Rust tests
        run: cargo test --workspace

      - name: Rust clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Rust clippy wasm
        run: cargo clippy --workspace --target wasm32-unknown-unknown -- -D warnings

      - name: Production build
        run: npm run build

      - name: Upload build artifact
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist
          retention-days: 1
          if-no-files-found: error

  deploy:
    # Only auto-deploy on pushes to main, after checks pass. PRs do not deploy.
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: checks
    runs-on: ubuntu-latest
    concurrency:
      # Serialise deploys so two rapid pushes don't race the Cloudflare deploy
      # endpoint. Don't cancel an in-progress deploy — finish then re-run.
      group: deploy-production
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist

      - name: Deploy to Cloudflare
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          # Pin wrangler 4.x — `wrangler.jsonc` uses the Workers Assets
          # `assets` config block, which is only understood by wrangler 4+.
          # The action's default is currently a 3.x release that fails with
          # "Missing entry-point" on our config.
          wranglerVersion: "4.94.0"
          # dist/ comes from the artifact uploaded by the `checks` job;
          # wrangler reads it via the `assets.directory` in wrangler.jsonc.
          command: deploy
